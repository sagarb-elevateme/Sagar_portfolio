<style>
:root{
  --bg:#0b1220;
  --card:#111827;
  --accent:#38bdf8;
  --text:#e2e8f0;
  --muted:#94a3b8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Poppins',sans-serif;
  color:var(--text);
  background:linear-gradient(rgba(11,18,32,0.92),rgba(11,18,32,0.97)),
             url('https://raw.githubusercontent.com/sagarb-elevateme/Sagar_portfolio/refs/heads/main/images%20(2).jfif');
  background-size:cover;
  background-attachment:fixed;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:15px;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px 15px;
}

.profile-img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid var(--accent);
  object-fit:cover;
  margin-bottom:15px;
}

/* TYPOGRAPHY */
h1{
  font-size:clamp(1.8rem,5vw,2.6rem);
  margin:10px 0;
}

h2{
  font-size:clamp(1.3rem,4vw,1.8rem);
  border-bottom:2px solid #1f2937;
  padding-bottom:8px;
  margin-bottom:12px;
}

.tagline{
  color:var(--muted);
  font-size:clamp(0.9rem,3vw,1rem);
}

/* LINKS */
.links{
  margin-top:10px;
}

.links a{
  display:inline-block;
  margin:5px 8px;
  color:var(--accent);
  text-decoration:none;
  font-weight:500;
  font-size:0.9rem;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:15px;
}

/* CARD */
.card{
  background:rgba(17,24,39,0.9);
  padding:16px;
  border-radius:14px;
  backdrop-filter:blur(10px);
  box-shadow:0 6px 20px rgba(0,0,0,0.4);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
}

/* LIST */
ul{
  padding-left:18px;
}

.metric{
  color:var(--accent);
  font-weight:600;
}

.section{
  margin-bottom:20px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:0.85rem;
  color:var(--muted);
}

/* ✅ TABLET */
@media(min-width:600px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .hero{
    padding:60px 20px;
  }

  .profile-img{
    width:140px;
    height:140px;
  }
}

/* ✅ DESKTOP */
@media(min-width:1024px){
  .grid{
    grid-template-columns:repeat(2,1fr);
  }

  .container{
    padding:20px;
  }

  .card{
    padding:22px;
  }
}
</style>
